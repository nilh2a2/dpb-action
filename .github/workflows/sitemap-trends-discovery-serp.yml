name: sitemap-trends-discovery-serp

on:
  # Every 3 hours, shortly after the main scan run.
  schedule:
    - cron: '15 */3 * * *'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - development
          - production
        default: 'development'

jobs:
  sitemap-trends-discovery-serp:
    uses: ./.github/workflows/_base.yml
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.environment || 'production' }}
      timeout-minutes: 30
      command: sitemap-trends discovery-domains-serp
