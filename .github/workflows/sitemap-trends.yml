name: Sitemap Trends

on:
  # Every 3 hours (8x per day, includes 5:00 AM Beijing time at 21:00 UTC)
  schedule:
    - cron: '0 */3 * * *'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - development
          - production
        default: 'development'

jobs:
  sitemap-trends:
    uses: ./.github/workflows/_base.yml
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.environment || 'production' }}
      timeout-minutes: 30
      command: sitemap-trends exec
