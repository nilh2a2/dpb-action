name: sitemap-trends-google-trends-refresh

on:
  # Every 30 minutes. Keep each run short so schedules can land on different hosted runners.
  schedule:
    - cron: '*/30 * * * *'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - development
          - production
        default: 'development'

jobs:
  sitemap-trends-google-trends-refresh:
    uses: ./.github/workflows/_base.yml
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.environment || 'production' }}
      timeout-minutes: 10
      command: sitemap-trends google-trends-refresh
