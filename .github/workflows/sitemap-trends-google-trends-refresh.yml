name: sitemap-trends-google-trends-refresh

on:
  # Every 90 minutes, staggered away from scan/discovery runs.
  schedule:
    - cron: '45 */3 * * *'
    - cron: '15 2-23/3 * * *'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - development
          - production
        default: 'development'

jobs:
  sitemap-trends-google-trends-refresh:
    uses: ./.github/workflows/_base.yml
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.environment || 'production' }}
      timeout-minutes: 30
      command: sitemap-trends google-trends-refresh
